version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["actions/*"]
      third-party:
        patterns: ["*"]
        exclude-patterns: ["actions/*"]
    commit-message:
      prefix: "ci"
    labels: ["dependencies", "ci"]
