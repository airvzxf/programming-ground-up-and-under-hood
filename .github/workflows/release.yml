name: CI - Build and Release

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04 # Pin version to match Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            lmodern \
            build-essential \
            gcc-multilib \
            zip \
            git

      - name: Build books
        run: bash src/make.bash

      # Optional: Also compile examples to verify there are no errors
      - name: Build ASM examples
        run: bash src/resource/asm/make.bash

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: books
          path: release/latest/
          retention-days: 7

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: books
          path: release/latest/

      - name: Upload to Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            release/latest/ProgrammingGroundUp.pdf
            release/latest/ProgrammingGroundUp.epub
            release/latest/ProgrammingGroundUp.html
            release/latest/ProgrammingGroundUp.md
            release/latest/resource.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}